<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Script</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #1c1a1e;
        color: #f2f0f2;
        font-family: system-ui, sans-serif;
        box-sizing: border-box;
        overflow-y: auto;
      }

      h1 {
        font-size: 15px;
        margin: 0 0 12px;
      }

      .script-view {
        color: #f2f0f2;
        font-size: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        text-align: left;
        background: #2d2a30;
        border-radius: 6px;
        padding: 10px;
        margin: 0;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <h1 id="heading"></h1>
    <pre class="script-view" id="script-view"></pre>
    <script>
      const params = new URLSearchParams(location.search);
      document.getElementById('heading').textContent = params.get('heading') || '';
      document.getElementById('script-view').textContent = params.get('script') || '';
    </script>
  </body>
</html>
