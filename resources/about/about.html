<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>About LGL Keychron Helper</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 32px 24px;
        background: #1c1a1e;
        color: #f2f0f2;
        font-family: system-ui, sans-serif;
        text-align: center;
      }

      .icon {
        font-size: 48px;
        line-height: 1;
        margin-bottom: 12px;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 4px;
      }

      .version {
        color: #b5b0b8;
        margin: 0 0 24px;
        font-size: 13px;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      a.button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
      }

      a.button svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      a.github {
        background: #2d2a30;
        color: #f2f0f2;
        border: 1px solid #45414a;
      }

      a.kofi {
        background: #ff5f5f;
        color: #1c1a1e;
      }

      .copyright {
        color: #8a848c;
        font-size: 12px;
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <div class="icon">⌨️</div>
    <h1>LGL Keychron Helper</h1>
    <p class="version" id="version"></p>
    <div class="buttons">
      <a
        class="button github"
        href="https://github.com/linuxgamerlife/lgl-keychron-tool"
        target="_blank"
        rel="noopener"
        ><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path
            fill-rule="evenodd"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
          ></path></svg
        >View on GitHub</a
      >
      <a class="button kofi" href="https://ko-fi.com/linuxgamerlife" target="_blank" rel="noopener"
        >☕ Buy me a coffee</a
      >
    </div>
    <p class="copyright">Made by LinuxGamerLife<br />with help from his little AI friends</p>
    <script>
      const version = new URLSearchParams(window.location.search).get('version');
      document.getElementById('version').textContent = version ? `v${version}` : '';
    </script>
  </body>
</html>
